version: "0.5"
tasks:
  chroma:
    command: chroma run --path ${CHROMA_DATA_DIR:-./data/chroma}
    availability:
      restart: true
  app:
    command: python -m uvicorn app:app --host ${APP_HOST:-127.0.0.1} --port ${APP_PORT:-7000}
    depends_on:
      chroma:
        condition: process_started
